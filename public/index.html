    <!-- JSON-LD: Local Business -->
    <script type="application/ld+json">

      },

      "email": "info@scorpiongolfcarts.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "San Pedro",
        "addressRegion": "Belize District",
        "addressCountry": "BZ"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 17.9175,
        "longitude": -87.9658
      },
      "openingHours": "Mo-Su 08:00-22:00",
      "priceRange": "$$",
      "currenciesAccepted": "USD, BZD",
      "paymentAccepted": "Cash, Credit Card",
      "areaServed": {
        "@type": "City",
        "name": "San Pedro, Ambergris Caye"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Golf Cart Rental Fleet",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Product",

            }

          {

            "itemOffered": {
              "@type": "Product",

            }
          }
        ]
      }
    }
    </script>

    <!-- Preload icon font: browser fetches woff2 immediately during HTML parsing,
         before any JS/CSS is processed — icons are ready when React first renders -->
    <link rel="preload" href="%PUBLIC_URL%/fonts/material-symbols-outlined.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Inline @font-face binds the font name to the preloaded file right away -->
    <style>
      @font-face {
        font-family: 'Material Symbols Outlined';
        font-style: normal;
        font-weight: 100 700;
        font-display: block;
        src: url('/fonts/material-symbols-outlined.woff2') format('woff2');
      }
    </style>
    <!-- Text fonts: loaded async so a blocked Google connection never causes a black screen -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" /></noscript>

    <!-- Splash screen — painted instantly from raw HTML before any JS or React runs -->
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: radial-gradient(ellipse at center, #024a30 0%, #012d1d 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 28px;
        transition: opacity 0.6s ease;
      }
      #splash.out { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 120px; height: 120px; object-fit: contain;
        animation: sp-pulse 2.4s ease-in-out infinite;
        filter: drop-shadow(0 8px 24px rgba(1,45,29,0.5));
      }
      #splash-ring {
        width: 44px; height: 44px;
        border: 3px solid rgba(193,236,212,0.18);
        border-top-color: #c1ecd4;
        border-radius: 50%;
        animation: sp-spin 0.9s linear infinite;
      }
      #splash-brand {
        color: rgba(193,236,212,0.55);
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; margin: 0;
      }
      @keyframes sp-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.82; transform: scale(0.96); }
      }
      @keyframes sp-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="splash" role="status" aria-label="Loading Scorpion Golf Cart Rental">
      <img id="splash-logo" src="/scorpionlogo.png" alt="Scorpion Golf Cart Rental" />
      <div id="splash-ring" aria-hidden="true"></div>
      <p id="splash-brand">Scorpion Golf Cart Rental</p>
    </div>
    <div id="root"></div>
  </body>
</html>
